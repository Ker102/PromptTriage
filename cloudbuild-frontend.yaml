# Cloud Build config for the frontend (Next.js)
# Builds the Docker image and deploys to Cloud Run automatically.

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/prompttriage-ui:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/prompttriage-ui:latest"
      - "-f"
      - "promptrefiner-ui/Dockerfile"
      - "promptrefiner-ui"

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/prompttriage-ui:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/prompttriage-ui:latest"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "prompttriagefe"
      - "--image"
      - "gcr.io/$PROJECT_ID/prompttriage-ui:$COMMIT_SHA"
      - "--region"
      - "europe-west1"
      - "--platform"
      - "managed"

images:
  - "gcr.io/$PROJECT_ID/prompttriage-ui:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/prompttriage-ui:latest"
