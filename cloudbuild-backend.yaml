# Cloud Build config for the backend (FastAPI)
# Builds the Docker image and deploys to Cloud Run automatically.

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/prompttriage-api:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/prompttriage-api:latest"
      - "-f"
      - "backend/Dockerfile"
      - "backend"

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/prompttriage-api:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/prompttriage-api:latest"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "prompttriagebe"
      - "--image"
      - "gcr.io/$PROJECT_ID/prompttriage-api:$COMMIT_SHA"
      - "--region"
      - "europe-west1"
      - "--platform"
      - "managed"

images:
  - "gcr.io/$PROJECT_ID/prompttriage-api:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/prompttriage-api:latest"
