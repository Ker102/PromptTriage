# Isolated conda environment for Study B training
# Usage: conda env create -f environment.yml
# Activate: conda activate unsloth
name: unsloth
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - torch>=2.4.0
    - unsloth
    - trl>=0.15.0
    - datasets
    - sentencepiece
    - protobuf
    - packaging>=20.0,<26.0
    - ipykernel
